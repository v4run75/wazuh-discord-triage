services:
  wazuh-triage:
    build: .
    image: wazuh-discord-triage:latest
    restart: unless-stopped
    env_file: .env
    # Host networking so the container can reach Ollama on localhost:11434
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
